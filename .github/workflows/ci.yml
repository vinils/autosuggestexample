name: CI
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      environment:
        description: 'Environment to deploy to'
        type: choice
        options:
        - development
        - staging
        - production

  push:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.run_number }}-${{ github.run_attempt }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-15]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    env:
      XCODE_VERSION: 16.4.0    
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Install Application Packages
        run: |
          yarn install --frozen-lockfile

      - name: Use appropriate Xcode version
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install CocoaPods Native Dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Generate Production JavaScript Offline Bundle
        run: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/main.jsbundle_assets

      - name: Compile Standalone Simulator Binary Archive (Debug Build)
        run: |
          xcodebuild \
            -workspace ios/example.xcworkspace \
            -scheme example \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5' \
            ONLY_ACTIVE_ARCH=NO \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym \
            clean build

      - name: Find build output path
        run: |
          APP_DIR=$(find . ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d -print -quit 2>/dev/null)
          echo "IOS_APP_PATH=$APP_DIR" >> $GITHUB_ENV
        
      - name: Embed bundle into .app (safety copy)
        run: |
          APP_DIR="${{ env.IOS_APP_PATH }}"
       
          echo "Checking for bundle at $APP_DIR/main.jsbundle"
          # Copy bundle and asset files into the .app if not already embedded
          if [ -f ios/main.jsbundle ]; then
            cp ios/main.jsbundle "$APP_DIR/" || true
          fi
          if [ -d ios/main.jsbundle_assets ]; then
            cp -R ios/main.jsbundle_assets/* "$APP_DIR/" || true
          fi
          # Verify
          ls -la "$APP_DIR" | sed -n '1,200p'

      - name: Compress App for Distribution Artifacts
        run: |
          mkdir -p build-output
          cp -R ios/build/Build/Products/Release-iphonesimulator/example.app build-output/
          cd build-output && zip -r ios-simulator-build.zip example.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build-output/ios-simulator-build.zip
