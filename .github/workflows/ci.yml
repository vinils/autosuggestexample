name: CI
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      environment:
        description: 'Environment to deploy to'
        type: choice
        options:
        - development
        - staging
        - production

  push:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '.gitignore'
      - '*.md'
      - 'LICENSE'
  merge_group:
    types:
      - checks_requested

concurrency:
  group: ${{ github.run_number }}-${{ github.run_attempt }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'yarn'

      - name: Enable Corepack
        run: |
          corepack enable

      - name: Install Application Packages
        run: |
          yarn install --frozen-lockfile

      - name: Install CocoaPods Native Dependencies
        run: |
          cd ios
          RCT_NEW_ARCH_ENABLED=1 pod install --repo-update

      - name: Clean Project Workspaces
        run: |
          cd ios
          RCT_NEW_ARCH_ENABLED=1 xcodebuild clean -workspace example.xcworkspace -scheme example -configuration Release

      - name: Generate Production JavaScript Offline Bundle
        run: |
          npx react-native bundle \
            --entry-file index.js \
            --platform ios \
            --dev false \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios/

      - name: Compile Standalone Simulator Binary Archive (Debug Build)
        env:
          OBJC_DISABLE_CHECKS: 1
        run: |
          RCT_NEW_ARCH_ENABLED=1 xcodebuild \
            -workspace ios/example.xcworkspace \
            -scheme example \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro,OS=26.0.1' \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_BUNDLING=false \
            DEBUG_INFORMATION_FORMAT=dwarf-with-dsym

      - name: Force Embed Bundle variations into App Package Structure
        run: |
          TARGET_APP_DIR="ios/build/Build/Products/Debug-iphonesimulator/example.app"
          mkdir -p "$TARGET_APP_DIR"
          cp ios/main.jsbundle "$TARGET_APP_DIR/main.jsbundle"
          cp ios/main.jsbundle "$TARGET_APP_DIR/index.jsbundle"

      - name: Verify Bundle Contents
        run: |
          TARGET_APP_DIR="ios/build/Build/Products/Debug-iphonesimulator/example.app"
          echo "=== Checking bundle files ==="
          ls -la "$TARGET_APP_DIR/" | grep -E "jsbundle|index" || echo "Bundles not found!"
          echo "=== Bundle size ==="
          du -sh "$TARGET_APP_DIR"/main.jsbundle 2>/dev/null || echo "main.jsbundle not found"

      - name: Compress App for Distribution Artifacts
        run: |
          mkdir -p build-output
          cp -R ios/build/Build/Products/Debug-iphonesimulator/example.app build-output/
          cd build-output && zip -r ios-simulator-build.zip example.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-app
          path: build-output/ios-simulator-build.zip        
